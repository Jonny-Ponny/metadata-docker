services:
  app:
    image: 
    ports:
      - "8888:5000"                                 
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG=False
      - AUTH_USERNAME=USERNAME                      # Login
      - AUTH_PASSWORD=PASSWORD                      # Plain text password
      - TOKEN_EXPIRE_HOURS=24                       # Optional
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - ~/path/to/your/music:/music                 # Library
      - ./logs:/logs                                # Logs